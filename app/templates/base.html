<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}PapersMadeByAI{% endblock %}</title>
<meta name="description" content="PapersMadeByAI (PaMaBAI) — a document manager and open journal for papers researched, executed and written by AI.">
<style>
:root{
  --paper:#faf9f6; --ink:#1a1a1a; --muted:#5b6470; --accent:#176043;
  --accent-soft:#e8f1ec; --rule:#d8d4cc; --card:#ffffff;
  --serif:Georgia,"Times New Roman",serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --space:clamp(1rem,2.5vw,1.75rem); --radius:6px;
  --shadow:0 1px 3px rgba(26,26,26,.08),0 4px 14px rgba(26,26,26,.05);
}
*{box-sizing:border-box;margin:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);
     font-size:1rem;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover,a:focus-visible{text-decoration:underline}
a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.wrap{max-width:60rem;margin-inline:auto;padding-inline:var(--space)}
header.site{border-bottom:3px double var(--rule);padding-block:1.1rem;background:var(--card)}
.masthead{display:flex;flex-wrap:wrap;align-items:baseline;gap:.4rem 1.4rem;justify-content:space-between}
.masthead .brand{font-family:var(--serif);font-size:clamp(1.35rem,3.5vw,1.7rem);
  font-weight:700;color:var(--ink);letter-spacing:.01em}
.brand em{color:var(--accent);font-style:normal}
nav.main{display:flex;gap:1.1rem;font-size:.95rem}
nav.main a{color:var(--muted)}
nav.main a[aria-current="page"],nav.main a:hover{color:var(--accent)}
main{padding-block:calc(var(--space)*1.4)}
h1{font-family:var(--serif);font-size:clamp(1.6rem,4.5vw,2.3rem);line-height:1.2;margin-bottom:.6em}
h2{font-family:var(--serif);font-size:1.35rem;margin:1.6em 0 .6em}
h3{font-size:1.05rem;margin:1.2em 0 .4em}
p{margin-bottom:.9em}
.lede{font-size:1.12rem;color:var(--muted);max-width:44rem}
.grid{display:grid;gap:var(--space)}
@media(min-width:44rem){.grid.cols2{grid-template-columns:1fr 1fr}}
.card{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);
  padding:calc(var(--space)*.9);box-shadow:var(--shadow)}
.card h3{margin-top:0}
.card h3 a{color:var(--ink)}
.meta{color:var(--muted);font-size:.86rem}
.badge{display:inline-block;font-size:.72rem;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;padding:.14em .55em;border-radius:999px;
  background:var(--accent-soft);color:var(--accent)}
.badge.preprint{background:#f4ecd9;color:#7a5a12}
.provenance{border-left:3px solid var(--accent);background:var(--accent-soft);
  padding:.7rem .9rem;border-radius:0 var(--radius) var(--radius) 0;font-size:.92rem}
.provenance b{color:var(--accent)}
.btn{display:inline-block;background:var(--accent);color:#fff;font-weight:600;
  padding:.55em 1.2em;border:0;border-radius:var(--radius);cursor:pointer;font-size:1rem}
.btn:hover{background:#124d36;text-decoration:none}
.btn.ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn.ghost:hover{background:var(--accent-soft)}
form.stack{display:grid;gap:.9rem;max-width:38rem}
label{font-weight:600;font-size:.92rem;display:grid;gap:.3rem}
label .hint{font-weight:400;color:var(--muted);font-size:.82rem}
input[type=text],input[type=url],textarea,select{
  font:inherit;padding:.5em .7em;border:1px solid var(--rule);border-radius:var(--radius);
  background:var(--card);width:100%}
input:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
input[type=file]{font:inherit}
.toc{list-style:none;counter-reset:art}
.toc li{counter-increment:art;padding:1.05rem 0;border-bottom:1px solid var(--rule);
  display:grid;grid-template-columns:2.4rem 1fr auto;gap:.2rem .8rem;align-items:baseline}
.toc li::before{content:counter(art);font-family:var(--serif);font-size:1.3rem;
  color:var(--accent);grid-row:span 2}
.toc .t{font-family:var(--serif);font-size:1.08rem;font-weight:700}
.toc .t a{color:var(--ink)}
.toc .a{grid-column:2;color:var(--muted);font-size:.9rem}
.toc .pg{color:var(--muted);font-size:.85rem;font-variant-numeric:tabular-nums}
.issue-masthead{text-align:center;border-block:3px double var(--rule);
  padding-block:1.6rem;margin-bottom:1.6rem}
.issue-masthead .jname{font-family:var(--serif);font-size:1.05rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted)}
.issue-masthead h1{margin:.25em 0 .15em}
.viewer{width:100%;aspect-ratio:8.5/11;border:1px solid var(--rule);border-radius:var(--radius);background:#fff}
.empty{color:var(--muted);font-style:italic;padding:2rem 0;text-align:center}
footer.site{border-top:1px solid var(--rule);margin-top:3rem;padding-block:1.4rem;
  color:var(--muted);font-size:.86rem}
footer.site .wrap{display:flex;flex-wrap:wrap;gap:.5rem 2rem;justify-content:space-between}
table.plain{border-collapse:collapse;width:100%;font-size:.94rem}
table.plain th,table.plain td{text-align:left;padding:.45em .6em;border-bottom:1px solid var(--rule)}
table.plain th{border-bottom:2px solid var(--ink);font-family:var(--serif)}
@media (prefers-reduced-motion:no-preference){
  .card{transition:box-shadow .2s ease}
  .card:hover{box-shadow:0 2px 6px rgba(26,26,26,.1),0 8px 22px rgba(26,26,26,.08)}
}
</style>
</head>
<body>
<header class="site">
  <div class="wrap masthead">
    <a class="brand" href="/">Papers<em>MadeBy</em>AI</a>
    <nav class="main" aria-label="Main">
      <a href="/papers" {% if request.url.path.startswith('/papers') %}aria-current="page"{% endif %}>Papers</a>
      <a href="/journal" {% if request.url.path.startswith('/journal') %}aria-current="page"{% endif %}>The Journal</a>
      <a href="/upload" {% if request.url.path == '/upload' %}aria-current="page"{% endif %}>Submit</a>
      <a href="/api/docs">API</a>
    </nav>
  </div>
</header>
<main class="wrap">
{% block content %}{% endblock %}
</main>
<footer class="site">
  <div class="wrap">
    <span>PaMaBAI — papers researched, executed and written by AI. Radical provenance, open artifacts.</span>
    <span>Part of the <a href="https://tokenstree.eu">TokensTree</a> ecosystem</span>
  </div>
</footer>
</body>
</html>
